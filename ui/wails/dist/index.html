<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPCGen Desktop</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>NPCGen — Wails UI</h1>

    <div class="actions">
      <button id="btnGenerate">Generate NPC</button>
      <button id="btnRefresh">Refresh List</button>
      <button id="btnClear">Delete All</button>
    </div>

    <div class="columns">
      <section class="left">
        <h2>Stored NPCs</h2>
        <div id="list"></div>
      </section>

      <section class="right">
        <h2>NPC Details / Edit</h2>
        <form id="npcForm">
          <input type="hidden" id="f_id" name="id" value="">
          <div><label>Name <input id="f_name" name="name" /></label></div>
          <div><label>Type <select id="f_type" name="type"></select></label></div>
          <div><label>Subtype <select id="f_subtype" name="subtype"></select></label></div>
          <div><label>Species <select id="f_species" name="species" disabled></select></label></div>
          <div><label>Faction <select id="f_faction" name="faction"></select></label></div>
          <div><label>Trait <select id="f_traits" name="traits"></select></label></div>
          <div><label>Stats <input id="f_stats" name="stats" readonly /></label></div>
          <div><label>Items <input id="f_items" name="items" readonly /></label></div>
          <div><label>Description <input id="f_description" name="description" /></label></div>
          <div><label>LocationID <input id="f_location" name="location" value="default" /></label></div>

          <div class="actions">
            <button type="button" id="btnReroll" disabled>Reroll Stats/Items</button>
            <button type="button" id="btnSave">Save</button>
            <button type="button" id="btnClose">Close</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
